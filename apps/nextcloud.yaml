apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nextcloud
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/slin86/argocd
    targetRevision: main
    path: infra/nextcloud
  destination:
    server: https://kubernetes.default.svc
    namespace: nextcloud
  syncPolicy:
    automated:
      prune: true        # gelöschte Manifeste → Ressourcen werden entfernt
      selfHeal: true     # manuelle Cluster-Änderungen werden zurückgedreht
    syncOptions:
      - CreateNamespace=true
