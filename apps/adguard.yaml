apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: adguard
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/slin86/argocd
    targetRevision: main
    path: apps/adguard
  destination:
    server: https://kubernetes.default.svc
    namespace: adguard
  syncPolicy:
    automated:
      prune: true        # gelöschte Manifeste → Ressourcen werden entfernt
      selfHeal: true     # manuelle Cluster-Änderungen werden zurückgedreht
    syncOptions:
      - CreateNamespace=true
