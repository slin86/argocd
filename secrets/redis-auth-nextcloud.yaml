apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: redis-auth-nextcloud
  namespace: redis
spec:
  hostAPI: http://infisical-infisical-standalone-infisical.infisical.svc.cluster.local:8080/api
  resyncInterval: 60
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: homelab-ei-fj
        envSlug: prod
        secretsPath: /redis
      credentialsRef:
        secretName: infisical-machine-identity
        secretNamespace: infisical-operator
  managedKubeSecretReferences:
    # Gleicher Secret-Name wie bisher -> Nextcloud-Deployment bleibt unveraendert.
    # Achtung: Wert in Infisical (/redis -> password) muss exakt dem
    # Bootstrap-Secret redis-auth im Namespace "redis" entsprechen!
    - secretName: redis-auth
      secretNamespace: nextcloud
      creationPolicy: Owner
